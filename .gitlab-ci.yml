include:
  - local: 'pipeline/inputs.yml'
    inputs:
      cloud-provider: $[[ inputs.cloud-provider ]]
      region: $[[ inputs.region ]]
      instance-type: $[[ inputs.instance-type ]]

stages:
  - provision
  - install
  - generate
  - destroy

variables:
  AWS_SSH_USER: "ubuntu"
  GCP_SSH_USER: "vpn-factory"
  DO_SSH_USER: "root"

.provision-instance-template:
  needs: []
  stage: provision
  image: 
    name: fureasu346/opentofu:v1.11.5
    entrypoint: [""]
  environment:
    name: $[[ inputs.cloud-provider ]]-$[[ inputs.region ]]
    on_stop: $[[ inputs.cloud-provider ]]-tear-down
  script:
    - tofu init -input=false -reconfigure
    - tofu plan -input=false -out ${CI_PIPELINE_ID}.tfplan
    - tofu apply -input=false ${CI_PIPELINE_ID}.tfplan
    - tofu show -json > ${CI_PIPELINE_ID}.json
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/$[[ inputs.cloud-provider ]]/${CI_PIPELINE_ID}.json
    expire_in: 30 days
  cache:
    key: tofu-files
    paths:
      - ${CI_PROJECT_DIR}/$[[ inputs.cloud-provider ]]/.terraform

.all-init: &all-init
  - cd ${CI_PROJECT_DIR}/$[[ inputs.cloud-provider ]]
  - sed -i "s|dev|$CI_PIPELINE_ID|" backend.tf
  - echo "Setting global variables"
  - printf '%s="%s"\n' "gl_user" "$CI_USER" >> ci.auto.tfvars
  - printf '%s="%s"\n' "gl_pat" "$CI_PAT" >> ci.auto.tfvars
  - |
    for VAR in "${VARS[@]}"; do
      if [ -n "${!VAR+x}" ]; then
        echo "$VAR is set"
        tfvar="${VAR#AWS_}"
        tfvar_lc="${tfvar,,}"
        printf '%s="%s"\n' "$tfvar_lc" "${!VAR}" >> ci.auto.tfvars
      else
        echo "$VAR is not set. Using default"
      fi
    done

.aws-init: &aws-init
  variables:
    AWS_REGION: $[[ inputs.region ]]
    AWS_INSTANCE_TYPE: $[[ inputs.instance-type ]]
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual
  before_script:
    - declare -a VARS=( 'AWS_REGION' 'AWS_INSTANCE_TYPE' 'AWS_ACCESS_KEY' 'AWS_SECRET_KEY' 'AWS_VPC_CIDR' )
    - *all-init

.do-init: &do-init
  variables:
    DO_REGION: $[[ inputs.region ]]
    DO_INSTANCE_TYPE: $[[ inputs.instance-type ]]
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "do" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual
  before_script:
    - declare -a VARS=( 'DO_REGION' 'DO_INSTANCE_TYPE' 'DO_TOKEN' )
    - *all-init

aws-provision:
  <<: *aws-init
  extends: [.provision-instance-template]

do-provision:
  <<: *do-init
  extends: [.provision-instance-template]

.tear-down-template:
  needs:
    - job: $[[ inputs.cloud-provider ]]-provision
      artifacts: false
      optional: false
  environment:
    name: $[[ inputs.cloud-provider ]]-$[[ inputs.region ]]
    action: stop
  stage: destroy
  image: 
    name: fureasu346/opentofu:v1.11.5
    entrypoint: [""]
  script:
    - tofu init -input=false -reconfigure
    - tofu plan -input=false -destroy -out ${CI_PIPELINE_ID}.destroy.tfplan
    - tofu apply -input=false ${CI_PIPELINE_ID}.destroy.tfplan
    - echo "Deleting state file"
    - |
      curl --request DELETE \
        --header "Private-Token: $CI_PAT" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${CI_PIPELINE_ID}"
    - echo "Deployment torn down and tfstate file deleted"
  cache:
    key: tofu-files
    paths:
      - ${CI_PROJECT_DIR}/$[[ inputs.cloud-provider ]]/.terraform
  manual_confirmation: "Are you sure you want to stop the $[[ inputs.cloud-provider ]]-$[[ inputs.region ]] environment"

aws-tear-down:
  <<: *aws-init
  extends: [.tear-down-template]

do-tear-down:
  <<: *do-init
  extends: [.tear-down-template]

.remote-access-template:
  image: fureasu346/pipeline-util:v1
  needs:
    - job: $[[ inputs.cloud-provider ]]-provision
      artifacts: true
      optional: false
  before_script:
    - echo "Configuring ssh"
    - INFO_FILE="${CI_PROJECT_DIR}/$[[ inputs.cloud-provider ]]/${CI_PIPELINE_ID}.json"
    - INSTANCE_IP=$(jq -r '.values.outputs.instance_ip.value' ${INFO_FILE})
    - LOCAL_KEY="$HOME/.ssh/vpn-factory-key.priv"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIV_KEY" > $LOCAL_KEY && chmod 400 $LOCAL_KEY
    - echo "Testing private key file"
    - ssh-keygen -y -f $LOCAL_KEY > /dev/null
    - ssh-keyscan -H "$INSTANCE_IP" >> ~/.ssh/known_hosts
    - printf "%b" "Host instance\n\tHostName $INSTANCE_IP\n\tUser $SSH_USER\n\tPort 22\n\tIdentityFile $LOCAL_KEY\n" > ~/.ssh/config
    - echo "Testing ssh connection"
    - ssh -o BatchMode=yes instance uptime

.outline-install: &outline-install
  stage: install
  script:
    - API_PORT=$(jq -r '.values.outputs.randomized_ports.value[0]' ${INFO_FILE})
    - KEYS_PORT=$(jq -r '.values.outputs.randomized_ports.value[1]' ${INFO_FILE})
    - echo "Sending script file to remote instance"
    - scp scripts/install-outline.sh instance:.
    - ssh instance "
        API_PORT=$API_PORT
        KEYS_PORT=$KEYS_PORT
        bash install-outline.sh
      "
    - scp instance:./outline/outline-api.json .
    - mkdir ${CI_PROJECT_DIR}/outline && mv outline-api.json ${CI_PROJECT_DIR}/outline
    - echo "Cleaning up install script from remote instance"
    - ssh instance "rm install-outline.sh"
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/outline
    expire_in: 30 days

.outline-key-template:
  stage: generate
  image: fureasu346/pipeline-util:v1
  needs:
    - job: $[[ inputs.cloud-provider ]]-outline-install
      artifacts: true
      optional: false
  variables:
    KEY_NAMES: "outline-${CI_JOB_ID}"
  script:
    - API_URL=$(jq -r '.apiUrl' ${CI_PROJECT_DIR}/outline/outline-api.json )
    - IFS=',' read -ra KEYS <<< "$KEY_NAMES"
    - |
      for KEY in "${KEYS[@]}"; do
        echo "Generating key for $KEY"
        API_URL="$API_URL" KEY_NAME="$KEY" bash scripts/get-outline-key.sh
      done
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/outline
    expire_in: 30 days

aws-outline-install:
  <<: *outline-install
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual
  extends: .remote-access-template
  variables:
    SSH_USER: $AWS_SSH_USER

do-outline-install:
  <<: *outline-install
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "do" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual
  extends: .remote-access-template
  variables:
    SSH_USER: $DO_SSH_USER

aws-outline-key-generate:
  extends: [ .outline-key-template ]
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "aws" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual

do-outline-key-generate:
  extends: [ .outline-key-template ]
  rules:
    - if: '"$[[ inputs.cloud-provider ]]" == "do" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
      when: manual


.outline-install-template: 
  stage: install
  script:
    - API_PORT=$(jq -r '.values.outputs.randomized_ports.value[0]' ${INFO_FILE})
    - KEYS_PORT=$(jq -r '.values.outputs.randomized_ports.value[1]' ${INFO_FILE})
    - echo "Sending script file to remote instance"
    - scp scripts/install-outline.sh instance:.
    - ssh instance "
        API_PORT=$API_PORT
        KEYS_PORT=$KEYS_PORT
        bash install-outline.sh
      "
    - scp instance:./outline/outline-api.json .
    - mkdir ${CI_PROJECT_DIR}/outline && mv outline-api.json ${CI_PROJECT_DIR}/outline
    - echo "Cleaning up install script from remote instance"
    - ssh instance "rm install-outline.sh"
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/outline
    expire_in: 30 days

.outline-key-template:
  stage: generate
  image: fureasu346/pipeline-util:v1
  variables:
    KEY_NAMES: "outline-${CI_JOB_ID}"
  script:
    - API_URL=$(jq -r '.apiUrl' ${CI_PROJECT_DIR}/outline/outline-api.json )
    - IFS=',' read -ra KEYS <<< "$KEY_NAMES"
    - |
      for KEY in "${KEYS[@]}"; do
        echo "Generating key for $KEY"
        API_URL="$API_URL" KEY_NAME="$KEY" bash scripts/get-outline-key.sh
      done
    - echo "Sending environment information to telegram..."
    - |
      curl -X POST \
        -d chat_id="${TELEGRAM_CHAT_ID}" \
        -d text="Provider ==> ${PROVIDER}\nRegion ==> ${REGION}\nPIPELINE_ID ==> ${CI_PIPELINE_ID}\nVPN ==> outline\nKeys are as below" \
        https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage > /dev/null
    - echo "Sending keys to telegram..."
    - declare -a KEY_FILES=($(ls ${CI_PROJECT_DIR}/keys/outline))
    - |
      for KEY_FILE in "${KEY_FILES[@]}"; do
        KEY_NAME=$(jq -r '.name' ${CI_PROJECT_DIR}/keys/outline/${KEY_FILE})
        KEY=$(jq -r '.accessUrl' ${CI_PROJECT_DIR}/keys/outline/${KEY_FILE})
        curl -X POST \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="${KEY_NAME}" \
          https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage > /dev/null
        curl -X POST \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="${KEY}" \
          https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage > /dev/null
      done
    - echo "Successful sent keys to telegram"
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/keys/outline
    expire_in: 30 days
